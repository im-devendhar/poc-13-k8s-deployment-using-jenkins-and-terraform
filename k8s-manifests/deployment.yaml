apiVersion: apps/v1
kind: Deployment
metadata: 
  name: endhunger-deployment
  labels:
    app: endhunger
spec:
  replicas: 2
  selector:
    matchLabels:
     app: endhunger
  template:
    metadata:
    labels:
      app: endhunger
    spec:
      containers:
      - name: endhunger
        image: devenops641/endhunger
        ports:
        - containerPort: 80 