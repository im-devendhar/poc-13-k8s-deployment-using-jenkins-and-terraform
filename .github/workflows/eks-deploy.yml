name: EKS Infrastructure + App Deployment

on:
  push:
    branch: [main]
  workflow_dispatch:

env:
  CLUSTER_NAME: eks-cluster
  REGION: us-east-1
  SA_NAMESPACE: kube-system
  SA_NAME: aws-load-balancer-controller
  POLICY_NAME: AWSLoadBalancerControllerIAMPolicy

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 90

    steps:
    # -------------------- Checkout --------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------- AWS CLI ---------------------
    - name: Install AWS CLI
      run: |
        set -euxo pipefail
        if ! command -v unzip >/dev/null; then
          sudo apt-get update -y
          sudo apt-get install -y unzip
        fi
        if ! command -v aws >/dev/null; then
          curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
        fi
        aws --version

    - name: Configure AWS Credentials
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: |
        set -euxo pipefail
        aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
        aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
        aws configure set default.region "$REGION"
        aws sts get-caller-identity

    # -------------------- Terraform -------------------
    - name: Install Terraform
      run: |
        set -euxo pipefail
        sudo apt-get update -y
        sudo apt-get install -y gnupg software-properties-common wget lsb-release
        if [ ! -f /usr/share/keyrings/hashicorp-archive-keyring.gpg ]; then
          wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg >/dev/null
        fi
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/hashicorp.list >/dev/null
        sudo apt-get update -y
        sudo apt-get install -y terraform
        terraform -version

    # -------------------- Docker (optional) -----------
    - name: Install Docker
      run: |
        set -euxo pipefail
        if ! command -v docker >/dev/null; then
          sudo apt-get update -y
          sudo apt-get install -y docker.io
          sudo systemctl enable docker
          sudo systemctl start docker
        fi
        docker --version

    # --------- Terraform Plan with -detailed-exitcode -----
    - name: Terraform Plan (detailed exit code)
      id: plan
      working-directory: infrastructure
      run: |
        set -euxo pipefail
        terraform init -upgrade
        terraform validate

        set +e
        terraform plan -detailed-exitcode -out=tfplan
        CODE=$?
        set -e

        echo "code=${CODE}" >> "$GITHUB_OUTPUT"

        if [ "$CODE" -eq 1 ]; then
          echo "Terraform plan failed."
          exit 1
        elif [ "$CODE" -eq 0 ]; then
          echo "No changes detected. Apply will be skipped."
        else
          echo "Changes detected. Apply will run."
        fi

    # --------- Terraform Apply (when changes exist) -----
    - name: Terraform Apply (Create/Update EKS)
      if: steps.plan.outputs.code == '2'
      working-directory: infrastructure
      run: |
        set -euxo pipefail
        terraform apply -auto-approve tfplan

    # -------------------- Wait for EKS -----------------
    - name: Wait for EKS Cluster
      run: |
        set -euxo pipefail
        echo "Waiting for EKS cluster ${CLUSTER_NAME} in ${REGION}..."
        MAX=80
        i=0
        while true; do
          STATUS=$(aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --region "$REGION" \
            --query "cluster.status" \
            --output text || echo "CREATING")

          echo "Cluster Status = $STATUS"

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "Cluster Ready"
            break
          fi

          i=$((i+1))
          if [ $i -ge $MAX ]; then
            echo "Timed out waiting for EKS cluster to become ACTIVE."
            exit 1
          fi
          sleep 30
        done

    # -------------------- eksctl -----------------------
    - name: Install eksctl
      run: |
        set -euxo pipefail
        if ! command -v eksctl >/dev/null; then
          ARCH=$(uname -m)
          curl -sSL "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$(uname -s)_${ARCH}.tar.gz" -o /tmp/eksctl.tgz
          tar -xzf /tmp/eksctl.tgz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin/eksctl
        fi
        eksctl version

    # -------------------- kubectl ----------------------
    - name: Install kubectl
      run: |
        set -euxo pipefail
        if ! command -v kubectl >/dev/null; then
          KVER=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
        fi
        kubectl version --client

    # -------------------- Helm -------------------------
    - name: Install Helm
      run: |
        set -euxo pipefail
        if ! command -v helm >/dev/null; then
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 -o /tmp/get_helm.sh
          chmod +x /tmp/get_helm.sh
          sudo /tmp/get_helm.sh
        fi
        helm version

    # -------------- OIDC + IAM Policy + IRSA Role (Helm will create SA) ------
    - name: Configure OIDC + IRSA (create IAM role; Helm will create SA)
      run: |
        set -euxo pipefail
        aws eks update-kubeconfig --region "$REGION" --name "$CLUSTER_NAME"

        echo "=== Step 1: Associate OIDC Provider ==="
        eksctl utils associate-iam-oidc-provider \
          --cluster "$CLUSTER_NAME" \
          --region "$REGION" \
          --approve

        echo "=== Step 2: Download IAM Policy ==="
        curl -fsSL -o iam-policy.json \
          https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/main/docs/install/iam_policy.json

        echo "=== Step 3: Create IAM Policy if not exists ==="
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        POLICY_ARN="arn:aws:iam::$ACCOUNT_ID:policy/$POLICY_NAME"
        if ! aws iam get-policy --policy-arn "$POLICY_ARN" >/dev/null 2>&1; then
          aws iam create-policy \
            --policy-name "$POLICY_NAME" \
            --policy-document file://iam-policy.json
        fi

        echo "=== Step 4: Create/Ensure IRSA IAM Role (trusts this cluster's OIDC for SA ${SA_NAMESPACE}/${SA_NAME}) ==="
        OIDC_ISSUER=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region "$REGION" --query 'cluster.identity.oidc.issuer' --output text)
        OIDC_PROVIDER="${OIDC_ISSUER#https://}"
        ROLE_NAME="alb-controller-irsa-${CLUSTER_NAME}-${SA_NAMESPACE}-${SA_NAME}"

        if ! aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
          # Write JSON literal without variable expansion
          cat > trust-policy.json <<'EOF'
{
  "Version": "2012-10-17",
  "Statement": [
    {
      "Effect": "Allow",
      "Principal": { "Federated": "arn:aws:iam::ACCOUNT_ID:oidc-provider/OIDC_PROVIDER" },
      "Action": "sts:AssumeRoleWithWebIdentity",
      "Condition": {
        "StringEquals": {
          "OIDC_PROVIDER:aud": "sts.amazonaws.com",
          "OIDC_PROVIDER:sub": "system:serviceaccount:SA_NAMESPACE:SA_NAME"
        }
      }
    }
  ]
}
EOF
          # Substitute placeholders safely
          sed -i "s|ACCOUNT_ID|${ACCOUNT_ID}|g" trust-policy.json
          sed -i "s|OIDC_PROVIDER|${OIDC_PROVIDER}|g" trust-policy.json
          sed -i "s|SA_NAMESPACE|${SA_NAMESPACE}|g" trust-policy.json
          sed -i "s|SA_NAME|${SA_NAME}|g" trust-policy.json

          aws iam create-role --role-name "$ROLE_NAME" --assume-role-policy-document file://trust-policy.json >/dev/null
          aws iam attach-role-policy --role-name "$ROLE_NAME" --policy-arn "$POLICY_ARN"
        fi

        ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text)
        echo "ROLE_ARN=${ROLE_ARN}" >> "$GITHUB_ENV"
        echo "Configured IRSA IAM role: $ROLE_ARN"

    # --------- Install ALB CRDs ------------
    - name: Install ALB Controller CRDs
      run: |
        set -euxo pipefail
        kubectl apply -f https://raw.githubusercontent.com/aws/eks-charts/master/stable/aws-load-balancer-controller/crds/crds.yaml

    # --------- AWS Load Balancer Controller (Helm creates SA) -----
    - name: Install AWS Load Balancer Controller
      run: |
        set -euxo pipefail

        if ! helm repo list | awk '{print $1}' | grep -qx eks; then
          helm repo add eks https://aws.github.io/eks-charts
        fi
        helm repo update

        VPC_ID=$(aws eks describe-cluster \
          --name "$CLUSTER_NAME" \
          --region "$REGION" \
          --query "cluster.resourcesVpcConfig.vpcId" \
          --output text)

        # Helm creates the ServiceAccount with IRSA annotation (more reliable than eksctl SA in CI)
        helm upgrade -i aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n "$SA_NAMESPACE" \
          --set clusterName="$CLUSTER_NAME" \
          --set serviceAccount.create=true \
          --set serviceAccount.name="$SA_NAME" \
          --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="$ROLE_ARN" \
          --set region="$REGION" \
          --set vpcId="$VPC_ID"

        kubectl -n "$SA_NAMESPACE" rollout status deploy/aws-load-balancer-controller --timeout=300s

    # ----------------- Deploy Application ---------------
    - name: Deploy Kubernetes Application
      run: |
        set -euxo pipefail
        kubectl apply -f k8s-manifests/namespace.yaml || true
        kubectl apply -f k8s-manifests/deployment.yaml
        kubectl apply -f k8s-manifests/service.yaml
        kubectl apply -f k8s-manifests/ingress.yaml || true

        kubectl get pods -o wide
        kubectl get svc -o wide

    # ----------------- Get Application URL --------------
    - name: Get Application URL
      run: |
        set -euxo pipefail
        HOST=$(kubectl get ingress -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
        if [ -n "$HOST" ]; then
          echo "Application URL: http://$HOST"
        else
          echo "Ingress hostname not ready yet."
        fi

    # ----------------- Cluster Diagnostics ---------------
    - name: Cluster Status Report
      if: always()
      run: |
        set +e
        echo "=== Post-Deployment Cluster Overview ==="
        kubectl get nodes || true
        kubectl get pods -A || true
        kubectl get svc -A || true
        kubectl get ingress -A || true